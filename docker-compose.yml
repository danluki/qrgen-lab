services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - gateway
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: ./frontend
    depends_on:
      - gateway

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      PORT: "8080"
      REDIS_ADDR: redis:6379
    depends_on:
      - redis

  qrgen:
    build:
      context: .
      dockerfile: qrgen/Dockerfile
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7.4-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data

volumes:
  redis-data:
